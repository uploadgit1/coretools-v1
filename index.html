<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Core Tools — a curated directory of core tools, powered by AI, that businesses are already using." />
  <title>Core Tools</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

  <!-- ============================================================
       VIEW: HOMEPAGE
  ============================================================ -->
  <div id="view-home">

    <header class="site-header">
      <div class="container">
        <div class="header-inner">
          <a href="#" class="logo" id="logo-link" aria-label="Core Tools home">
            <span class="logo-text">Core Tools</span>
            <span class="logo-badge">AI</span>
          </a>
          <p class="header-tagline">A curated directory of core tools, powered by AI, that businesses are already using.</p>
        </div>
      </div>
    </header>

    <div class="filter-bar" id="filter-bar">
      <div class="container">
        <div class="filter-inner">
          <input
            type="search"
            id="search-input"
            placeholder="Search tools..."
            aria-label="Search tools"
            autocomplete="off"
          />
          <div class="category-pills" id="category-pills" role="group" aria-label="Filter by category">
            <!-- Generated by app.js -->
          </div>
        </div>
      </div>
    </div>

    <main class="main-content">
      <div class="container">
        <div class="card-grid" id="card-grid" role="list">
          <!-- Generated by app.js -->
        </div>
        <div class="no-results hidden" id="no-results" role="status">
          <p>No tools match your search. Try a different term or reset the filters.</p>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>Core Tools &mdash; <span id="footer-year"></span></p>
      </div>
    </footer>

  </div>


  <!-- ============================================================
       VIEW: TOOL DETAIL
  ============================================================ -->
  <div id="view-tool" class="hidden">

    <div class="tool-nav">
      <div class="container">
        <div class="tool-nav-inner">
          <button class="back-btn" id="back-btn" aria-label="Back to all tools">
            <span class="back-arrow" aria-hidden="true">&#8592;</span> Back to all tools
          </button>
          <button class="next-tool-btn" id="next-tool-btn" aria-label="Go to next tool">
            Next tool &#8594;
          </button>
        </div>
      </div>
    </div>

    <div class="tool-page">
      <div class="container">

        <!-- Two-column: left = info, right = gallery -->
        <div class="tool-layout-cols">

          <!-- Left column: header, links, who's using it -->
          <div class="tool-col-left">

            <!-- A: Header -->
            <section id="tool-header" aria-label="Tool overview"></section>

            <!-- B: Official Links -->
            <section id="tool-links-section" aria-label="Official links">
              <h2 class="section-label">Official Links</h2>
              <div id="tool-links" class="tool-links"></div>
            </section>

            <!-- C: Who's Using It -->
            <section id="tool-who-section" aria-label="Who is using this tool">
              <h2 class="section-label">Who's Using It</h2>
              <div id="who-list" class="who-list"></div>
            </section>

          </div>
          <!-- end .tool-col-left -->

          <!-- Right column: gallery -->
          <div class="tool-col-right">

            <!-- D: Screenshot Gallery -->
            <section id="tool-gallery-section" aria-label="Screenshots">
              <h2 class="section-label">Screenshots</h2>
              <div class="gallery">
                <div class="gallery-main" id="gallery-main">
                  <div class="gallery-nav-col">
                    <span class="gallery-side-counter" id="gallery-counter-left" aria-live="polite"></span>
                    <button class="gallery-btn" id="gallery-prev" aria-label="Previous screenshot">&#8592;</button>
                  </div>
                  <div class="gallery-image-wrap">
                    <img id="gallery-img" src="" alt="" class="gallery-img" />
                  </div>
                  <div class="gallery-nav-col">
                    <span class="gallery-side-counter" id="gallery-counter-right" aria-hidden="true"></span>
                    <button class="gallery-btn" id="gallery-next" aria-label="Next screenshot">&#8594;</button>
                  </div>
                </div>
                <p class="gallery-caption" id="gallery-caption"></p>
              </div>
            </section>

          </div>
          <!-- end .tool-col-right -->

        </div>
        <!-- end .tool-layout-cols -->

        <!-- Full-width bottom section: video, use cases, notes -->
        <div class="tool-layout-bottom">

          <!-- E: Video -->
          <section id="tool-video-section" class="hidden" aria-label="Preview video">
            <h2 class="section-label">Preview Video</h2>
            <div class="video-wrap">
              <iframe
                id="tool-video-iframe"
                src=""
                title="Tool preview video"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen
                loading="lazy"
              ></iframe>
            </div>
          </section>

          <!-- F: Use Cases -->
          <section id="tool-usecases-section" class="hidden" aria-label="Common use cases">
            <h2 class="section-label">Common Use Cases</h2>
            <ul id="usecases-list" class="usecases-list"></ul>
          </section>

          <!-- G: Notes -->
          <section id="tool-notes-section" class="hidden" aria-label="Notes and considerations">
            <h2 class="section-label">Notes</h2>
            <div id="notes-block" class="notes-block"></div>
          </section>

        </div>
        <!-- end .tool-layout-bottom -->

      </div>
    </div>

  </div>
  <!-- end #view-tool -->


  <!-- ============================================================
       LIGHTBOX — hidden until an image is clicked
  ============================================================ -->
  <div id="lightbox" class="lightbox hidden" role="dialog" aria-modal="true" aria-label="Enlarged screenshot">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close enlarged image">&#x2715;</button>
    <img id="lightbox-img" src="" alt="" class="lightbox-img" />
  </div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/tool.js"></script>

</body>
</html>
